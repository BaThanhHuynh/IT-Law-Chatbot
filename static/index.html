<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Law Chatbot - Tư vấn Luật Công nghệ thông tin</title>
    <meta name="description" content="Chatbot tư vấn Luật Công nghệ thông tin Việt Nam sử dụng AI và Knowledge Graph">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css?v=1.3">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z" />
                            <path d="M2 17l10 5 10-5" />
                            <path d="M2 12l10 5 10-5" />
                        </svg>
                    </div>
                    <h1 class="logo-text"></h1>
                </div>
                <button class="btn-new-chat" id="btnNewChat" title="Cuộc hội thoại mới">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                </button>
            </div>
            <div class="sidebar-conversations" id="conversationList">
                <div class="conversation-empty">
                    <p>Chưa có cuộc hội thoại nào</p>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="tech-badge">
                    <span class="badge">RAG</span>
                    <span class="badge">GraphRAG</span>
                    <span class="badge">Gemini</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <button class="btn-toggle-sidebar" id="btnToggleSidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <div class="header-title">
                    <h2 id="chatTitle">ITL Assistant</h2>
                </div>
                <button class="btn-toggle-graph" id="btnToggleGraph" title="Knowledge Graph">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="6" cy="6" r="3" />
                        <circle cx="18" cy="6" r="3" />
                        <circle cx="6" cy="18" r="3" />
                        <circle cx="18" cy="18" r="3" />
                        <line x1="8.5" y1="7.5" x2="15.5" y2="16.5" />
                        <line x1="15.5" y1="7.5" x2="8.5" y2="16.5" />
                    </svg>
                </button>
            </header>

            <!-- Chat Area -->
            <div class="chat-wrapper">
                <div class="chat-area" id="chatArea">
                    <!-- Welcome Screen -->
                    <div class="welcome-screen" id="welcomeScreen">
                        <div class="welcome-icon">
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)"
                                stroke-width="1.5">
                                <defs>
                                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#19c37d" />
                                        <stop offset="100%" stop-color="#10a37f" />
                                    </linearGradient>
                                </defs>
                                <path d="M12 2L2 7l10 5 10-5-10-5z" />
                                <path d="M2 17l10 5 10-5" />
                                <path d="M2 12l10 5 10-5" />
                            </svg>
                        </div>
                        <h2>Xin chào!</h2>
                        <p>Tôi là chatbot hỗ trợ tư vấn luật CNTT Việt Nam</p>
                        <div class="suggestion-cards">
                            <button class="suggestion-card"
                                onclick="sendSuggestion('Những hành vi nào bị nghiêm cấm trong lĩnh vực CNTT?')">
                                <span class="suggestion-icon"></span>
                                <span>Hành vi bị nghiêm cấm trong CNTT</span>
                            </button>
                            <button class="suggestion-card"
                                onclick="sendSuggestion('Quyền sở hữu trí tuệ trong CNTT được bảo vệ như thế nào?')">
                                <span class="suggestion-icon"></span>
                                <span>Bảo vệ quyền sở hữu trí tuệ CNTT</span>
                            </button>
                            <button class="suggestion-card"
                                onclick="sendSuggestion('Thương mại điện tử được quy định như thế nào?')">
                                <span class="suggestion-icon"></span>
                                <span>Quy định về thương mại điện tử</span>
                            </button>
                            <button class="suggestion-card"
                                onclick="sendSuggestion('Cơ quan nhà nước có nghĩa vụ gì trên môi trường mạng?')">
                                <span class="suggestion-icon"></span>
                                <span>Nghĩa vụ của cơ quan nhà nước</span>
                            </button>
                        </div>
                    </div>

                    <!-- Messages container -->
                    <div class="messages-container" id="messagesContainer" style="display:none;">
                    </div>
                </div>

                <!-- Knowledge Graph Panel -->
                <div class="graph-panel" id="graphPanel">
                    <div class="graph-header">
                        <h3>Knowledge Graph</h3>
                        <button class="btn-close-graph" id="btnCloseGraph">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18" />
                                <line x1="6" y1="6" x2="18" y2="18" />
                            </svg>
                        </button>
                    </div>
                    <canvas id="graphCanvas"></canvas>
                    <div class="graph-legend">
                        <span class="legend-item"><span class="legend-dot" style="background:#818cf8"></span>Điều
                            luật</span>
                        <span class="legend-item"><span class="legend-dot" style="background:#34d399"></span>Khái
                            niệm</span>
                        <span class="legend-item"><span class="legend-dot" style="background:#fb923c"></span>Chủ
                            thể</span>
                        <span class="legend-item"><span class="legend-dot" style="background:#f87171"></span>Hành
                            vi</span>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" placeholder="Nhập câu hỏi về Luật Công nghệ thông tin..." rows="1"
                        maxlength="2000"></textarea>
                    <button class="btn-send" id="btnSend" title="Gửi">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>
                <p class="input-disclaimer">AI có thể mắc sai sót. Vui lòng kiểm tra lại các thông tin quan trọng.</p>
            </div>
        </main>
    </div>

    <script src="/js/app.js?v=1.3"></script>
</body>

</html>
